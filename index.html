<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedex | Global Logistics & Tracking</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: #f0f0f0; color: #333; }
        .nav { background: #4D148C; color: white; padding: 18px; border-bottom: 5px solid #FF6600; font-size: 22px; font-weight: bold; cursor: pointer; text-align: center; letter-spacing: 1px; }
        .orange { color: #FF6600; }
        .card { max-width: 420px; margin: 15px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; box-sizing: border-box; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 15px; }
        .btn { width: 100%; padding: 15px; background: #FF6600; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 17px; margin-top: 10px; }
        .result { display: none; margin-top: 15px; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .status-txt { font-size: 18px; font-weight: bold; color: #4D148C; display: block; margin-top: 5px; }
        .time-row { display: flex; justify-content: space-between; background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 13px; border: 1px solid #eee; }
        .fee-alert { display: none; color: #d32f2f; border: 2px solid #FF6600; padding: 15px; margin-top: 15px; background: #fff8f0; text-align: center; border-radius: 8px; }
        .admin-panel { display: none; background: #2c3e50; color: white; padding: 20px; margin-top: 25px; border-radius: 8px; }
        .label { font-size: 11px; color: #FF6600; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav" onclick="loginAdmin()">Fed<span class="orange">ex</span> Logistics</div>

<div class="card">
    <h3 style="color: #4D148C; margin-bottom: 15px;">Track Shipment</h3>
    <input type="text" id="trackInput" placeholder="Enter Tracking ID">
    <button class="btn" onclick="track()">TRACK NOW</button>

    <div id="details" class="result">
        <p style="margin:5px 0;"><strong>Route:</strong> <br><span id="vFrom"></span> → <span id="vTo"></span></p>
        <div class="time-row">
            <span>🚀 <b>Departed:</b><br><span id="vTimeFrom"></span></span>
            <span>🏁 <b>Estimated:</b><br><span id="vTimeTo"></span></span>
        </div>
        <p style="margin:10px 0;"><strong>Status:</strong> <span id="vStatus" class="status-txt"></span></p>
        <div id="vFeeBox" class="fee-alert">
            <span style="font-size: 14px;">TOTAL CLEARANCE FEE:</span><br>
            <span id="vFee" style="font-size: 24px; font-weight: 900;"></span>
            <button class="btn" style="background:#4D148C; font-size:13px; height: 40px; padding:0;" onclick="generateReceipt()">DOWNLOAD INVOICE</button>
        </div>
    </div>
</div>

<div class="admin-panel" id="adminBox">
    <h4 style="margin-top:0;">Admin Console</h4>
    <span class="label">SHIPMENT INFO</span>
    <input type="text" id="nId" placeholder="Tracking ID">
    <input type="text" id="nFrom" placeholder="From City/Country">
    <input type="text" id="nTo" placeholder="To City/Country">
    <input type="text" id="nTimeFrom" placeholder="Departure (e.g. 10:00 AM)">
    <input type="text" id="nTimeTo" placeholder="Arrival (e.g. 05:00 PM)">
    <span class="label">FINANCIALS</span>
    <input type="text" id="nFee" placeholder="Fee (e.g. $600)">
    <select id="nStatus">
        <option value="In Transit - Moving">In Transit</option>
        <option value="Held - Local Facility">On Hold</option>
        <option value="ARRIVED - PAYMENT NEEDED">ARRIVED - PAYMENT NEEDED</option>
    </select>
    <button class="btn" style="background:#27ae60" id="saveBtn" onclick="saveData()">SAVE CHANGES</button>
</div>

<script>
    let SESSION_KEY = ""; // This stays empty in the code
    const USER = "FedEx76"; 
    const REPO = "FedEx-tracking-"; 

    let currentData = null;
    let currentId = "";

    function loginAdmin() {
        const pass = prompt("Enter Admin Password:");
        if(pass === "0000") {
            SESSION_KEY = prompt("Paste your GitHub Token here:");
            if(SESSION_KEY) {
                document.getElementById('adminBox').style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
    }

    async function track() {
        const id = document.getElementById('trackInput').value.trim().toUpperCase();
        if(!id) return;
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues?labels=${id}&state=all`);
            const data = await res.json();
            if(data && data.length > 0) {
                currentData = JSON.parse(data[0].body);
                currentId = id;
                document.getElementById('details').style.display = 'block';
                document.getElementById('vFrom').innerText = currentData.from;
                document.getElementById('vTo').innerText = currentData.to;
                document.getElementById('vTimeFrom').innerText = currentData.timeFrom || "TBD";
                document.getElementById('vTimeTo').innerText = currentData.timeTo || "TBD";
                document.getElementById('vStatus').innerText = currentData.status;

                if(currentData.status === "ARRIVED - PAYMENT NEEDED") {
                    document.getElementById('vFeeBox').style.display = 'block';
                    document.getElementById('vFee').innerText = currentData.fee;
                } else { document.getElementById('vFeeBox').style.display = 'none'; }
            } else { alert("Tracking ID not found."); }
        } catch(e) { alert("Error connecting."); }
    }

    async function saveData() {
        const id = document.getElementById('nId').value.trim().toUpperCase();
        if(!id || !SESSION_KEY) return alert("Missing ID or Token!");
        const btn = document.getElementById('saveBtn');
        btn.innerText = "SAVING...";
        const packet = {
            from: document.getElementById('nFrom').value,
            to: document.getElementById('nTo').value,
            timeFrom: document.getElementById('nTimeFrom').value,
            timeTo: document.getElementById('nTimeTo').value,
            fee: document.getElementById('nFee').value,
            status: document.getElementById('nStatus').value
        };
        try {
            const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`, {
                method: 'POST',
                headers: { 'Authorization': `token ${SESSION_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: `ID: ${id}`, body: JSON.stringify(packet), labels: [id] })
            });
            if(response.ok) { alert("Saved Successfully!"); document.getElementById('adminBox').style.display='none'; }
            else { alert("GitHub rejected the token. Please use a fresh one."); }
        } catch(e) { alert("Error saving."); }
        finally { btn.innerText="SAVE CHANGES"; }
    }

    function generateReceipt() {
        const receipt = `--------------------------------\nFedex Global Express\nOFFICIAL INVOICE\n--------------------------------\nID: ${currentId}\nFROM: ${currentData.from}\nTO: ${currentData.to}\nTOTAL DUE: ${currentData.fee}\n--------------------------------`;
        const blob = new Blob([receipt], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Invoice_${currentId}.txt`;
        link.click();
    }
</script>
</body>
</html>
